<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treatments | LifeCare HMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-logo">LifeCare HMS</div>
            <a href="dashboard.html" class="nav-item">Dashboard</a>
            <a href="patients.html" class="nav-item" data-role="Admin,Receptionist">Patients</a>
            <a href="doctors.html" class="nav-item">Doctors</a>
            <a href="appointments.html" class="nav-item">Appointments</a>
            <a href="treatments.html" class="nav-item active" data-role="Admin,Doctor">Treatments</a>
            <a href="prescriptions.html" class="nav-item" data-role="Admin,Doctor">Prescriptions</a>
            <a href="medicines.html" class="nav-item" data-role="Admin,Receptionist">Medicines</a>
            <a href="billing.html" class="nav-item" data-role="Admin,Receptionist">Billing</a>
            <a href="reports.html" class="nav-item" data-role="Admin">Reports</a>
            <a href="#" onclick="logout()" class="nav-item" style="margin-top: auto; color: var(--danger);">Logout</a>
        </div>

        <!-- Main Content -->
        <main class="main-content">
            <header class="header">
                <h1>Clinical Treatments</h1>
                <button class="btn" style="width: auto;" onclick="openModal()">+ Record Treatment</button>
            </header>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Patient</th>
                            <th>Doctor</th>
                            <th>Diagnosis</th>
                            <th>Description</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody id="treatments-table"></tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div id="treatmentModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Record New Treatment</h2>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <form id="treatmentForm">
                <div class="form-group">
                    <label>Select Patient</label>
                    <select id="patientId" required></select>
                </div>
                <div class="form-group">
                    <label>Select Doctor</label>
                    <select id="doctorId" required></select>
                </div>
                <div class="form-group">
                    <label>Diagnosis</label>
                    <input type="text" id="diagnosis" required>
                </div>
                <div class="form-group">
                    <label>Treatment Description</label>
                    <textarea id="description" rows="3" required></textarea>
                </div>
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="treatmentDate" required>
                </div>
                <button type="submit" class="btn">Record Treatment</button>
            </form>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/treatments.js"></script>
</body>
</html>
